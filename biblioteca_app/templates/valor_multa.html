{% extends 'base.html' %}

{% block title %}Configurar Sistema | Acervo Virtual{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold text-dark mb-1"><i class="fa-solid fa-gear me-2 text-primary"></i> Configurações Globais</h4>
            <p class="text-muted small mb-0">Defina as regras financeiras e limites de locação</p>
        </div>
    </div>
    <div class="row">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                    <h5 class="fw-bold text-danger"><i class="fa-solid fa-scale-balanced me-2"></i> Regras Financeiras e Multas</h5>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        <input type="hidden" name="form-action" value="salvar-multa">
                        <div class="mb-4">
                            <label class="form-label text-muted">Valor de multa cobrado por cada dia de atraso (R$):</label>
                            <input type="number" name="multa-por-dia" step="0.01" value="{{ multa_por_dia }}" class="form-control form-control-lg fw-bold text-primary" required>
                        </div>
                        <div class="text-end">
                            <button type="submit" class="btn btn-primary w-100 py-2"><i class="fa-solid fa-save me-2"></i> Aplicar Nova Regra</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
