{% extends 'base.html' %}

{% block title %}Cadastrar Livro | Acervo Virtual{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold text-dark mb-1"><i class="fa-solid fa-book-medical me-2 text-primary"></i> Cadastrar Novo Livro</h4>
            <p class="text-muted small mb-0">Adicione uma nova obra ao catálogo do acervo</p>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form method="post" action="{% url 'cadastro_livros' %}" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="row g-4">
                    <div class="col-md-6"><label class="form-label fw-bold">Título</label><input type="text" name="titulo" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label fw-bold">Autor</label><input type="text" name="autor" class="form-control" required></div>
                    <div class="col-md-4"><label class="form-label fw-bold">Editora</label><input type="text" name="editora" class="form-control"></div>
                    <div class="col-md-4"><label class="form-label fw-bold">Edição</label><input type="text" name="edicao" class="form-control" required></div>
                    <div class="col-md-4"><label class="form-label fw-bold">Ano de Publicação</label><input type="date" name="data_publicacao" class="form-control"></div>
                    <div class="col-md-3"><label class="form-label fw-bold">Páginas</label><input type="number" name="numero_paginas" class="form-control" required></div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Gênero</label>
                        <div class="input-group">
                            <select name="genero" id="genero-select" class="form-select" required>
                                <option value="" selected disabled>Selecione...</option>
                                {% for g in generos %}
                                <option value="{{ g.nome }}">{{ g.nome }}</option>
                                {% endfor %}
                            </select>
                            <button type="button" class="btn btn-outline-primary" id="btn-add-genero" title="Adicionar Novo"><i class="fa-solid fa-plus"></i></button>
                        </div>
                    </div>
                    <div class="col-md-3"><label class="form-label fw-bold">Idioma</label>
                        <select name="idioma" class="form-select">
                            <option value="Português">Português</option>
                            <option value="Inglês">Inglês</option>
                            <option value="Espanhol">Espanhol</option>
                        </select>
                    </div>
                    <div class="col-md-3"><label class="form-label fw-bold">Localização Física</label><input type="text" name="localizacao" class="form-control" placeholder="Ex: Prateleira B"></div>
                    <div class="col-md-3"><label class="form-label fw-bold">Classificação</label><input type="number" name="classificacao" class="form-control" required></div>
                    <div class="col-md-3"><label class="form-label fw-bold">Qtd. Exemplares</label>
                        <select name="quantidade" class="form-select" required>
                            {% for num in quantidades %}<option value="{{ num }}">{{ num }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6"><label class="form-label fw-bold">Capa Principal</label><input type="file" name="capa" class="form-control" accept="image/*"></div>
                    <div class="col-md-6"><label class="form-label fw-bold">Mais Fotos (Opcional)</label><input type="file" name="imagens_adicionais" class="form-control" multiple accept="image/*" title="Segure Ctrl para selecionar várias fotos"></div>
                    <div class="col-12"><label class="form-label fw-bold">Sinopse</label><textarea name="sinopse" class="form-control" rows="4" required></textarea></div>
                </div>
                <div class="mt-4 text-end">
                    <button type="submit" class="btn btn-primary px-5 py-2"><i class="fa-solid fa-save me-2"></i> Cadastrar Livro</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.getElementById('btn-add-genero').addEventListener('click', function() {
        let novoGenero = prompt('Digite o nome do novo gênero literário:');
        if (novoGenero && novoGenero.trim() !== '') {
            novoGenero = novoGenero.trim();
            let select = document.getElementById('genero-select');
            let option = document.createElement('option');
            option.value = novoGenero;
            option.text = novoGenero;
            option.selected = true;
            select.add(option);
        }
    });
</script>
{% endblock %}
