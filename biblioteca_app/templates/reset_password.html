{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Acervo Virtual</title>
    <link rel="icon" href="{% static 'img/gato-icon.png' %}" type="image/png" sizes="512x512">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>

<body class="login-page">
    <main class="login-container">
        <div class="login-form-box">
            <img src="{% static 'img/acervo.png' %}" class="login-logo" alt="Logo da Biblioteca">
            <h2>Redefinir senha</h2>
            <p>Digite seu e-mail cadastrado para receber o link de redefinição de senha.</p>
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn">Enviar link</button>
            </form>
            <div class="forgot-password">
                <a href="{% url 'login_view' %}">Voltar ao login</a>
            </div>
        </div>

        <div class="login-image"></div>
    </main>
</body>

</html>
