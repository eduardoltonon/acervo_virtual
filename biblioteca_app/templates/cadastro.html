{% extends 'base.html' %}

{% block title %}Novo Funcionário | Acervo Virtual{% endblock %}

{% block content %}
<style>
    .video-camera-preview { object-fit: cover; }
    .img-camera-preview { object-fit: cover; }
</style>

<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold text-dark mb-1"><i class="fa-solid fa-user-plus me-2 text-primary"></i> Cadastrar Funcionário</h4>
            <p class="text-muted small mb-0">Crie uma nova conta com permissões de acesso</p>
        </div>
        <a href="{% url 'configuracao_contas' %}" class="btn btn-outline-secondary"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form method="POST">
                {% csrf_token %}
                <input type="hidden" name="form-action" value="cadastro-usuario">
                <div class="row g-4">
                    <div class="col-md-4">
                        <label for="id_username" class="form-label fw-bold">Nome de Usuário (Login)</label>
                        <input type="text" id="id_username" name="username" class="form-control" placeholder="Ex: joao.silva" required>
                    </div>
                    <div class="col-md-4">
                        <label for="id_password" class="form-label fw-bold">Senha de Acesso</label>
                        <input type="password" id="id_password" name="password" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label for="id_funcao" class="form-label fw-bold text-danger">Função (Permissões de Sistema)</label>
                        <select name="funcao" id="id_funcao" class="form-select border-danger" required aria-label="Função">
                            <option value="" selected disabled>Selecione uma função...</option>
                            <option value="administrador">Administrador (Acesso Total)</option>
                            <option value="bibliotecario">Bibliotecário (Catálogo e Circulação)</option>
                        </select>
                    </div>
                    
                    <div class="col-12 mt-5 mb-2 border-bottom"><h5 class="fw-bold text-secondary">Dados Pessoais</h5></div>
                    
                    <div class="col-md-8"><label for="id_nome" class="form-label fw-bold">Nome Completo</label><input type="text" id="id_nome" name="nome" class="form-control" required></div>
                    <div class="col-md-4"><label for="id_cpf" class="form-label fw-bold">CPF</label><input type="text" id="id_cpf" name="cpf" class="form-control" placeholder="Apenas números" required></div>
                    <div class="col-md-4"><label for="id_data_nascimento" class="form-label fw-bold">Data de Nascimento</label><input type="date" id="id_data_nascimento" name="data_nascimento" class="form-control" required></div>
                    <div class="col-md-4"><label for="id_email" class="form-label fw-bold">E-mail</label><input type="email" id="id_email" name="email" class="form-control" required></div>
                    <div class="col-md-4"><label for="id_celular" class="form-label fw-bold">Celular</label><input type="tel" id="id_celular" name="celular" class="form-control" required></div>
                    <div class="col-md-3"><label for="id_cep" class="form-label fw-bold">CEP</label><input type="text" id="id_cep" name="cep" class="form-control" required></div>
                    <div class="col-md-9"><label for="id_endereco" class="form-label fw-bold">Endereço Completo</label><input type="text" id="id_endereco" name="endereco" class="form-control" required></div>
                    <div class="col-md-6"><label for="id_complemento" class="form-label fw-bold">Complemento</label><input type="text" id="id_complemento" name="complemento" class="form-control"></div>
                    <div class="col-md-6"><label for="id_cidade" class="form-label fw-bold">Cidade</label><input type="text" id="id_cidade" name="cidade" class="form-control" required></div>
                    
                    <!-- Câmera para Foto do Funcionário -->
                    <div class="col-12 mt-4">
                        <label class="form-label fw-bold text-dark"><i class="fa-solid fa-camera text-primary me-2"></i>Foto do Funcionário (Opcional)</label>
                        <div class="d-flex flex-column align-items-center bg-light p-4 rounded shadow-sm border">
                            <video id="video-camera" width="320" height="240" class="border rounded shadow-sm d-none video-camera-preview" autoplay></video>
                            <canvas id="canvas-foto" width="320" height="240" class="d-none"></canvas>
                            <img id="img-preview" class="border rounded shadow-sm d-none mb-2 img-camera-preview" width="320" height="240" alt="Pré-visualização da foto">
                            
                            <div class="mt-3 d-flex gap-2">
                                <button type="button" id="btn-abrir-camera" class="btn btn-outline-primary fw-bold px-4">
                                    <i class="fa-solid fa-camera me-2"></i> Abrir Câmera
                                </button>
                                <button type="button" id="btn-capturar-foto" class="btn btn-primary fw-bold px-4 d-none">
                                    <i class="fa-solid fa-bolt me-2"></i> Bater Foto
                                </button>
                                <button type="button" id="btn-refazer-foto" class="btn btn-outline-secondary fw-bold px-4 d-none">
                                    <i class="fa-solid fa-rotate-right me-2"></i> Refazer
                                </button>
                            </div>
                            <input type="hidden" name="foto_base64" id="foto_base64">
                            <small class="text-muted mt-2 text-center" id="dica-camera">A imagem será vinculada ao perfil do funcionário.</small>
                        </div>
                    </div>
                </div>
                <div class="mt-5 text-end">
                    <button type="submit" class="btn btn-primary px-5 py-2"><i class="fa-solid fa-check me-2"></i> Criar Conta</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const video = document.getElementById('video-camera');
    const canvas = document.getElementById('canvas-foto');
    const imgPreview = document.getElementById('img-preview');
    const btnAbrir = document.getElementById('btn-abrir-camera');
    const btnCapturar = document.getElementById('btn-capturar-foto');
    const btnRefazer = document.getElementById('btn-refazer-foto');
    const inputFotoBase64 = document.getElementById('foto_base64');
    let stream = null;

    // 1. Abrir Câmera
    btnAbrir.addEventListener('click', async function() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            video.classList.remove('d-none');
            btnAbrir.classList.add('d-none');
            btnCapturar.classList.remove('d-none');
            imgPreview.classList.add('d-none');
        } catch (err) {
            alert("Permissão negada ou câmera não encontrada. Verifique as permissões do navegador.");
        }
    });

    // 2. Tirar Foto
    btnCapturar.addEventListener('click', function() {
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
        inputFotoBase64.value = dataUrl;
        imgPreview.src = dataUrl;
        video.classList.add('d-none');
        imgPreview.classList.remove('d-none');
        btnCapturar.classList.add('d-none');
        btnRefazer.classList.remove('d-none');
        if(stream) { stream.getTracks().forEach(track => track.stop()); }
    });

    // 3. Refazer Foto
    btnRefazer.addEventListener('click', async function() {
        inputFotoBase64.value = ""; 
        btnRefazer.classList.add('d-none');
        btnAbrir.click(); 
    });
});
</script>
{% endblock %}
